<!DOCTYPE html>
<html>

<head>
<title>Enterprise Inventory AI</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#111;
color:white;
margin:0;
padding:0;
text-align:center;
}

h2{
margin-top:20px;
}

#chat{
width:700px;
height:450px;
margin:auto;
margin-top:20px;
overflow-y:auto;
padding:10px;
border-radius:10px;
border:1px solid #333;
background:#181818;
}

.msg{
margin:8px;
padding:10px 14px;
border-radius:12px;
max-width:70%;
text-align:left;
word-wrap:break-word;
}

.user{
background:#2979ff;
margin-left:auto;
}

.ai{
background:#333;
margin-right:auto;
}

#inputArea{
margin-top:15px;
}

input{
width:500px;
padding:12px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#2979ff;
color:white;
cursor:pointer;
}

button:hover{
background:#1c54b2;
}

</style>
</head>

<body>

<h2>Enterprise Inventory AI</h2>

<div id="chat"></div>

<div id="inputArea">
<input id="query" placeholder="Ask about inventory...">
<button onclick="ask()">Send</button>
</div>


<script>

async function ask(){

let input=document.getElementById("query")
let q=input.value.trim()

if(q==="") return

let chat=document.getElementById("chat")

// show user message
chat.innerHTML+=`<div class="msg user">${q}</div>`

// clear input
input.value=""

// thinking message
let thinking=document.createElement("div")
thinking.className="msg ai"
thinking.innerText="AI is thinking..."
chat.appendChild(thinking)

// auto scroll
chat.scrollTop=chat.scrollHeight


try{

let res=await fetch("/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
org_id:"org_1",
query:q
})
})

let data=await res.json()

thinking.innerText=data.answer

}catch(error){

thinking.innerText="Error contacting AI server."

}

// scroll again
chat.scrollTop=chat.scrollHeight

}


// send message with ENTER
document.getElementById("query")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
ask()
}

})

</script>

</body>
</html>
